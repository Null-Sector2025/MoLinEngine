name: Build MoLin Engine

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev liblua5.4-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-x64
          path: build/libMoLinEngine.a

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      - name: Install deps
        run: C:\vcpkg\vcpkg install sdl2:x64-windows sdl2-image:x64-windows sdl2-mixer:x64-windows lua:x64-windows
      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-windows-x64
          path: build/Release/MoLinEngine.lib

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable multiarch
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
      - name: Install ARM64 cross-compile deps
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo apt-get install -y libsdl2-dev:arm64 libsdl2-image-dev:arm64 libsdl2-mixer-dev:arm64 liblua5.4-dev:arm64 2>/dev/null || echo "Some arm64 deps not in apt, will use pkg-config fallback"
      - name: Configure for ARM64
        run: |
          cmake -B build-arm64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON
      - name: Build
        run: cmake --build build-arm64
      - name: Verify artifact
        run: ls -la build-arm64/libMoLinEngine.so
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-arm64
          path: build-arm64/libMoLinEngine.so

  release:
    needs: [build-linux, build-windows, build-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package assets
        run: |
          mkdir -p dist/include
          cp -r engine/* dist/include/
          cp artifacts/MoLinEngine-linux-x64/libMoLinEngine.a dist/
          cp artifacts/MoLinEngine-windows-x64/MoLinEngine.lib dist/
          cp artifacts/MoLinEngine-arm64/libMoLinEngine.so dist/
          cd dist
          tar -czvf ../MoLinEngine-linux-x64.tar.gz libMoLinEngine.a include/
          tar -czvf ../MoLinEngine-arm64.tar.gz libMoLinEngine.so include/
          zip -r ../MoLinEngine-windows-x64.zip MoLinEngine.lib include/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "墨麟引擎 ${{ github.ref_name }}"
          body: "包含 Linux x64、Windows x64 静态库和 ARM64（手机/树莓派）动态库。"
          files: |
            MoLinEngine-linux-x64.tar.gz
            MoLinEngine-windows-x64.zip
            MoLinEngine-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
