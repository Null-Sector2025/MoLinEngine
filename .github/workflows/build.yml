name: Build MoLin Engine

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------- Linux x64 构建 ----------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev liblua5.4-dev
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-x64
          path: build/libMoLinEngine.a

  # ---------- Android arm64-v8a 构建 ----------
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a]
        api: [21]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk    # 必须添加 id，否则后续无法引用
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Set environment variables
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=android-${{ matrix.api }}" >> $GITHUB_ENV
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      - name: Clone vcpkg
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git $VCPKG_ROOT
          $VCPKG_ROOT/bootstrap-vcpkg.sh

      - name: Install Android dependencies via vcpkg
        run: |
          export ANDROID_NDK_HOME=${{ env.ANDROID_NDK_HOME }}
          export ANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }}
          $VCPKG_ROOT/vcpkg install \
            sdl2 \
            sdl2-image \
            sdl2-mixer \
            lua \
            --triplet arm64-android

      - name: Configure CMake for Android
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=arm64-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON

      - name: Build
        run: cmake --build build-android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-android-${{ matrix.arch }}
          path: build-android/libMoLinEngine.so
