name: Build MoLin Engine All Platforms

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev liblua5.4-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_VS_INCLUDE_INSTALL_TO_DEFAULT_BUILD=OFF
          cmake --build build
      - name: Package
        run: |
          mkdir -p dist/linux-x64/bin dist/linux-x64/lib dist/linux-x64/include
          cp build/MoLinEngineExe dist/linux-x64/bin/
          cp build/MoLinEditor dist/linux-x64/bin/
          cp build/libMoLinEngine.a dist/linux-x64/lib/
          cp -r engine/* dist/linux-x64/include/
          cd dist && tar -czvf ../MoLinEngine-linux-x64.tar.gz linux-x64/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-x64
          path: MoLinEngine-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      - name: Install deps
        run: |
          C:\vcpkg\vcpkg.exe install lua[cpp]:x64-windows sdl2:x64-windows sdl2-image:x64-windows sdl2-mixer:x64-windows sdl2-ttf:x64-windows
      - name: Build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_VS_INCLUDE_INSTALL_TO_DEFAULT_BUILD=OFF
          cmake --build build --config Release
      - name: Package
        shell: cmd
        run: |
          if not exist dist\windows-x64\bin mkdir dist\windows-x64\bin
          if not exist dist\windows-x64\lib mkdir dist\windows-x64\lib
          if not exist dist\windows-x64\include mkdir dist\windows-x64\include
          copy build\Release\MoLinEngineExe.exe dist\windows-x64\bin\
          copy build\Release\MoLinEditor.exe dist\windows-x64\bin\
          copy build\Release\MoLinEngine.lib dist\windows-x64\lib\
          xcopy /E /I engine dist\windows-x64\include\engine
          :: 手动复制必要的 SDL2 等 DLL（如果游戏需要独立运行）
          copy C:\vcpkg\installed\x64-windows\bin\SDL2.dll dist\windows-x64\bin\
          copy C:\vcpkg\installed\x64-windows\bin\SDL2_image.dll dist\windows-x64\bin\
          copy C:\vcpkg\installed\x64-windows\bin\SDL2_mixer.dll dist\windows-x64\bin\
          copy C:\vcpkg\installed\x64-windows\bin\SDL2_ttf.dll dist\windows-x64\bin\
          :: Lua DLL 名称可能不同，尝试复制
          if exist C:\vcpkg\installed\x64-windows\bin\lua.dll copy C:\vcpkg\installed\x64-windows\bin\lua.dll dist\windows-x64\bin\
          if exist C:\vcpkg\installed\x64-windows\bin\lua5.4.dll copy C:\vcpkg\installed\x64-windows\bin\lua5.4.dll dist\windows-x64\bin\
          cd dist && powershell Compress-Archive -Path windows-x64 -DestinationPath ..\MoLinEngine-windows-x64.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-windows-x64
          path: MoLinEngine-windows-x64.zip

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev liblua5.4-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_VS_INCLUDE_INSTALL_TO_DEFAULT_BUILD=OFF
          cmake --build build
      - name: Package
        run: |
          mkdir -p dist/linux-arm64/bin dist/linux-arm64/lib dist/linux-arm64/include
          cp build/MoLinEngineExe dist/linux-arm64/bin/
          cp build/MoLinEditor dist/linux-arm64/bin/
          cp build/libMoLinEngine.so dist/linux-arm64/lib/
          cp -r engine/* dist/linux-arm64/include/
          cd dist && tar -czvf ../MoLinEngine-linux-arm64.tar.gz linux-arm64/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-arm64
          path: MoLinEngine-linux-arm64.tar.gz

  release:
    needs: [build-linux-x64, build-windows, build-linux-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "墨麟引擎 ${{ github.ref_name }}"
          body: |
            ## 墨麟引擎 ${{ github.ref_name }}
            - **Linux x64**: 可执行文件 + 静态库 + 头文件
            - **Windows x64**: EXE + 静态库 + 头文件（含必要 DLL）
            - **Linux ARM64**: 可执行文件 + 动态库(.so) + 头文件
            - 内置 **墨麟编辑器** (MoLinEditor)
          files: |
            artifacts/MoLinEngine-linux-x64/MoLinEngine-linux-x64.tar.gz
            artifacts/MoLinEngine-windows-x64/MoLinEngine-windows-x64.zip
            artifacts/MoLinEngine-linux-arm64/MoLinEngine-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
