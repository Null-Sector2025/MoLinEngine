name: Build MoLin Engine

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev liblua5.4-dev libopenal-dev libgl-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build -j$(nproc)
      - name: Package
        run: |
          mkdir -p dist/linux-x64/bin dist/linux-x64/lib dist/linux-x64/include
          cp build/MoLinEngineExe dist/linux-x64/bin/
          cp build/MoLinEditor dist/linux-x64/bin/ 2>/dev/null || true
          cp build/libMoLinEngine.a dist/linux-x64/lib/ 2>/dev/null || true
          cp build/libMoLinEngine.so dist/linux-x64/lib/ 2>/dev/null || true
          cp -r engine/* dist/linux-x64/include/
          cd dist && tar -czf ../MoLinEngine-linux-x64.tar.gz linux-x64/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-x64
          path: MoLinEngine-linux-x64.tar.gz

  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      - name: Install deps
        run: C:\vcpkg\vcpkg.exe install lua[cpp]:x64-windows sdl2:x64-windows sdl2-image:x64-windows sdl2-mixer:x64-windows sdl2-ttf:x64-windows
      - name: Build
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j%NUMBER_OF_PROCESSORS%
      - name: Package
        shell: cmd
        run: |
          mkdir dist\windows-x64\bin dist\windows-x64\lib dist\windows-x64\include
          copy build\Release\MoLinEngineExe.exe dist\windows-x64\bin\
          copy build\Release\MoLinEditor.exe dist\windows-x64\bin\ 2>nul || echo "No editor"
          copy build\Release\MoLinEngine.lib dist\windows-x64\lib\
          xcopy /E /I engine dist\windows-x64\include\engine
          set VCPKG_BIN=C:\vcpkg\installed\x64-windows\bin
          copy %VCPKG_BIN%\SDL2.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\SDL2_image.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\SDL2_mixer.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\SDL2_ttf.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\libpng16.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\zlib1.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\vorbisfile.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\vorbis.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\ogg.dll dist\windows-x64\bin\
          copy %VCPKG_BIN%\freetype.dll dist\windows-x64\bin\
          if exist %VCPKG_BIN%\lua.dll copy %VCPKG_BIN%\lua.dll dist\windows-x64\bin\
          if exist %VCPKG_BIN%\lua5.4.dll copy %VCPKG_BIN%\lua5.4.dll dist\windows-x64\bin\
          cd dist && powershell Compress-Archive -Path windows-x64 -DestinationPath ..\MoLinEngine-windows-x64.zip
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-windows-x64
          path: MoLinEngine-windows-x64.zip

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev liblua5.4-dev libopenal-dev libgl-dev
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DBUILD_SHARED_LIBS=ON
          cmake --build build -j$(nproc)
      - name: Package
        run: |
          mkdir -p dist/linux-arm64/bin dist/linux-arm64/lib dist/linux-arm64/include
          cp build/MoLinEngineExe dist/linux-arm64/bin/
          cp build/MoLinEditor dist/linux-arm64/bin/ 2>/dev/null || true
          cp build/libMoLinEngine.so dist/linux-arm64/lib/
          cp -r engine/* dist/linux-arm64/include/
          cd dist && tar -czf ../MoLinEngine-linux-arm64.tar.gz linux-arm64/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-arm64
          path: MoLinEngine-linux-arm64.tar.gz

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: brew update && brew install cmake sdl2 sdl2_image sdl2_mixer sdl2_ttf lua openal-soft
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build -j$(sysctl -n hw.ncpu)
      - name: Package
        run: |
          mkdir -p dist/macos/bin dist/macos/lib dist/macos/include
          cp build/MoLinEngineExe dist/macos/bin/
          cp build/MoLinEditor dist/macos/bin/ 2>/dev/null || true
          cp build/libMoLinEngine.dylib dist/macos/lib/ 2>/dev/null || true
          cp build/libMoLinEngine.a dist/macos/lib/ 2>/dev/null || true
          cp -r engine/* dist/macos/include/
          cd dist && tar -czf ../MoLinEngine-macos.tar.gz macos/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-macos
          path: MoLinEngine-macos.tar.gz

  release:
    needs: [linux-x64, windows-x64, linux-arm64, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare files
        run: |
          mkdir -p release_files
          find artifacts -name "*.tar.gz" -o -name "*.zip" | xargs -I {} cp {} release_files/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "墨麟引擎 ${{ github.ref_name }}"
          body: |
            支持 Linux x64 / Windows x64 / Linux ARM64 / macOS
            包含引擎库、可执行文件、头文件
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
