name: Build MoLin Engine

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev liblua5.4-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-x64
          path: build/libMoLinEngine.a

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone --depth 1 https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      - name: Install deps
        run: C:\vcpkg\vcpkg install sdl2:x64-windows sdl2-image:x64-windows sdl2-mixer:x64-windows lua:x64-windows
      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-windows-x64
          path: build/Release/MoLinEngine.lib

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev liblua5.4-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
      - name: Build
        run: cmake --build build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-arm64
          path: build/libMoLinEngine.so

  release:
    needs: [build-linux-x64, build-windows, build-linux-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package assets
        run: |
          mkdir -p dist/include
          cp -r engine/* dist/include/
          cp artifacts/MoLinEngine-linux-x64/libMoLinEngine.a dist/
          cp artifacts/MoLinEngine-windows-x64/MoLinEngine.lib dist/
          cp artifacts/MoLinEngine-linux-arm64/libMoLinEngine.so dist/
          cd dist
          tar -czvf ../MoLinEngine-linux-x64.tar.gz libMoLinEngine.a include/
          tar -czvf ../MoLinEngine-linux-arm64.tar.gz libMoLinEngine.so include/
          zip -r ../MoLinEngine-windows-x64.zip MoLinEngine.lib include/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "墨麟引擎 ${{ github.ref_name }}"
          body: "包含 Linux x64、Windows x64 静态库和 Linux ARM64 动态库（可用于安卓 Termux/树莓派）。"
          files: |
            MoLinEngine-linux-x64.tar.gz
            MoLinEngine-windows-x64.zip
            MoLinEngine-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
