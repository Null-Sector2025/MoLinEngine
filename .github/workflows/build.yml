name: Build MoLin Engine

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev liblua5.4-dev

      - name: 配置 CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: 编译引擎
        run: cmake --build build --target MoLinEngine

      - name: 上传引擎库
        uses: actions/upload-artifact@v4
        with:
          name: MoLinEngine-linux-lib
          path: build/libMoLinEngine.a
